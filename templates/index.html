<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cloud Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
<link rel="icon" href="data:,">

</head>

<body onload="loadFiles(); setActive('nav-storage')">

 <button class="menu-btn" onclick="toggleSidebar()">☰</button>
 <div class="overlay" onclick="toggleSidebar()"></div>

<div class="app">

    
    <aside class="sidebar">
     <h4><br><br><br>☁️ JAMS</h4>
        <ul>
            <li id="nav-storage" onclick="loadFiles(); setActive('nav-storage')">My Storage</li>

            <li id="nav-overview" onclick="loadOverview(); setActive('nav-overview')">Overview</li>

            <li id="nav-recents" onclick="loadRecents(); setActive('nav-recents')">Recents</li>

            <li id="nav-favorites" onclick="loadFavorites(); setActive('nav-favorites')">Favorites</li>

            <li id="nav-trash" onclick="loadTrash(); setActive('nav-trash')">Trash</li>

            <li onclick="window.location.href='/login'">Logout</li>
        </ul>
    </aside>

    
    <main class="main">

        
        <div class="topbar">
            <input type="text" id="search" placeholder="Search files...">
        </div>

       
        <div id="dropZone" class="drop-zone">
            Drag & Drop files here or click to upload
            <input type="file" id="fileInput" hidden>
        </div>

        <div class="progress mt-2" style="height: 8px;">
            <div id="uploadProgress" class="progress-bar" style="width: 0%"></div>
        </div>

       
        <h5>Category</h5>
    <div class="categories">
        <div onclick="filterFiles('all')">📁 All</div>
        <div onclick="filterFiles('image')">🖼 Photos</div>
        <div onclick="filterFiles('video')">🎬 Videos</div>
        <div onclick="filterFiles('audio')">🎵 Audio</div>
    </div>

    
    <h5>All Files</h5>

    <button id="emptyTrashBtn" onclick="clearTrash()" 
        class="btn btn-danger mb-2" 
        style="display: none;">
        🧹 Empty Trash
    </button>

    <ul id="fileList"></ul>

    </main>

    
    <aside class="preview">

        <h4>File Preview</h4>
        <div id="previewContent">Select a file</div>

        <h4 class="mt-4">Storage</h4>
        <div class="circle" id="storageCircle">
            <span id="storagePercent">0%</span>
        </div>
        <p id="storageText">0GB / 100GB</p>

    </aside>

</div>

<script src="{{ url_for('static', filename='index.js') }}"></script>
</body>
</html>
